<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta Escaladora</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-3 py-md-5">
        <div class="text-center mb-4">
            <h1 class="display-5 display-md-4 fw-bold">🧗 Ruleta Escaladora</h1>
            <p class="lead">¡Gira para ver tu siguiente movimiento!</p>
        </div>

        <!-- Pantalla de Selección de Nivel -->
        <div id="pantalla-inicio" class="card bg-secondary shadow-lg border-0 mb-4" style="width: 100%; max-width: 500px;">
            <div class="card-body text-center p-4 p-md-5">
                <h2 class="h3 mb-4">Selecciona Nivel</h2>
                <div class="input-group mb-3">
                    <span class="input-group-text">👤</span>
                    <input type="text" id="input-climber-name" class="form-control" placeholder="Nombre del Escalador" value="Jugador">
                </div>
                <div class="d-grid gap-3">
                    <button id="btn-facil" class="btn btn-success btn-lg py-3 fw-bold">
                        NIVEL FÁCIL<br><small class="fw-light">(1 Movimiento: 3 Carreteles)</small>
                    </button>
                    <button id="btn-dificil" class="btn btn-danger btn-lg py-3 fw-bold">
                        NIVEL DIFÍCIL<br><small class="fw-light">(2 Movimientos: 6 Carreteles)</small>
                    </button>
                </div>
            </div>
        </div>

        <!-- Contenedor del Juego (Oculto al inicio) -->
        <div id="contenedor-juego" class="card bg-secondary shadow-lg border-0 mb-4 d-none" style="width: 100%; max-width: 500px;">
            <div class="card-body text-center p-3 p-md-5 position-relative">
                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center gap-2 mb-3">
                    <h5 class="mb-0 text-white-50 small d-flex align-items-center gap-2">
                        Esc: 
                        <div class="name-display-container text-truncate" style="max-width: 100px;">
                            <span id="display-climber-name">Jugador</span>
                        </div>
                    </h5>
                    <div class="d-flex gap-3">
                        <h5 class="mb-0 text-white-50 small d-flex align-items-center gap-2">
                            Pts: 
                            <div class="score-reel-container">
                                <div id="display-score" class="reel"></div>
                            </div>
                        </h5>
                        <h5 class="mb-0 text-white-50 small d-flex align-items-center gap-2">
                            Fallas: 
                            <div class="score-reel-container border-danger-subtle">
                                <div id="display-failed" class="reel"></div>
                            </div>
                        </h5>
                    </div>
                </div>
                
                <!-- Contenedor del Jackpot -->
                <div class="slot-machine flex-column align-items-center">
                    <!-- Fila 1 -->
                    <div id="fila-1" class="d-flex gap-2">
                        <div class="reel-container"><div id="reel-extremidad-1" class="reel"></div></div>
                        <div class="reel-container"><div id="reel-presa-1" class="reel"></div></div>
                        <div class="reel-container"><div id="reel-color-1" class="reel"></div></div>
                    </div>
                    <!-- Fila 2 (Oculta en nivel fácil) -->
                    <div id="fila-2" class="d-flex gap-2 mt-3 d-none">
                        <div class="reel-container"><div id="reel-extremidad-2" class="reel"></div></div>
                        <div class="reel-container"><div id="reel-presa-2" class="reel"></div></div>
                        <div class="reel-container"><div id="reel-color-2" class="reel"></div></div>
                    </div>
                </div>

                <div id="action-buttons" class="d-flex gap-2 mt-4 mb-4 justify-content-center d-none">
                    <button id="btn-cumplio" class="btn btn-success btn-lg flex-grow-1 py-3 fw-bold shadow">
                        ¡Cumplió! ✅
                    </button>
                    <button id="btn-no-cumplio" class="btn btn-danger btn-lg flex-grow-1 py-3 fw-bold shadow">
                        No Cumplió ❌
                    </button>
                </div>

                <div class="d-flex gap-2">
                    <button id="btn-volver" class="btn btn-outline-light px-3">🔙</button>
                    <button id="btn-girar" class="btn btn-primary btn-lg flex-grow-1 py-3 fw-bold shadow">
                        ¡GIRAR!
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-4 text-muted small">
            Ideal para juegos de prendas y entrenamiento de técnica.
        </div>
    </div>

    <!-- Botón Mute fuera del panel -->
    <button id="btn-mute" class="btn btn-outline-warning shadow-lg" title="Silenciar/Activar sonido">
        🔊
    </button>

    <!-- Audio para el efecto de click -->
    <audio id="click-sound" src="assets/click.mp3" preload="auto"></audio>
    <!-- Audio para el efecto de campana -->
    <audio id="ding-sound" src="assets/ding.mp3" preload="auto"></audio>

    <audio id="spin-sound" src="floraphonic.mp3" preload="auto"></audio>
    <audio id="acierto-sound" src="acierto.mp3" preload="auto"></audio>
    <audio id="error-sound" src="error.mp3" preload="auto"></audio>

    <!-- Script de lógica -->
    <script src="script.js"></script>
</body>
</html>
